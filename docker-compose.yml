services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./models:/models
    env_file: .env
    environment:
      - HF_HOME=/models/huggingface
      - TORCH_HOME=/models/torch
      - DOCLING_CACHE_DIR=/models/docling
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
